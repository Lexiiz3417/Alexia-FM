# nixpacks.toml

[phases.setup]
nixPkgs = [
    "nodejs",
    "fontconfig",
    "jetbrains-mono",
    "noto-fonts",
    "noto-fonts-emoji"
]

[phases.build]
# Tambahkan variabel environment buat fontconfig biar gak error
cmds = [
    "npm install", 
    "fc-cache -fv",
    "export FONTCONFIG_PATH=/etc/fonts" 
]

[start]
cmd = "node src/index.js"